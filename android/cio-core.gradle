dependencies {
    api "com.zixflow.com.android:datapipelines:$zixflowAndroidSDKVersion"
    api "com.zixflow.com.android:messaging-push-fcm:$zixflowAndroidSDKVersion"
    api "com.zixflow.com.android:messaging-in-app:$zixflowAndroidSDKVersion"
    // Location module is optional - customers enable it by adding
    // zixflow_location_enabled=true in their gradle.properties
    if (project.zixflowLocationEnabled) {
        api "com.zixflow.com.android:location:$zixflowAndroidSDKVersion"
    } else {
        compileOnly "com.zixflow.com.android:location:$zixflowAndroidSDKVersion"
    }
}
